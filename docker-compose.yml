services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./sample_conversations:/app/sample_conversations
    env_file:
      - .env
    environment:
      - VLLM_BASE_URL=http://vllm:8000/v1
    restart: on-failure

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./data:/app/data
      - ./sample_conversations:/app/sample_conversations

  # GPU-only service — start with: docker-compose --profile gpu up --build
  vllm:
    profiles: ["gpu"]
    image: vllm/vllm-openai:latest
    ports:
      - "8001:8000"
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    command: >
      --model ${MODEL_NAME:-Qwen/Qwen2-7B-Instruct}
      --tensor-parallel-size 1
      --dtype float16
      --max-model-len 4096
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  huggingface_cache:
